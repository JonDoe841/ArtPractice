{% extends "base.html" %}

{% block content %}
<h1>Delete Category</h1>

<p>Are you sure you want to delete "{{ category.name }}"?</p>
<p>This will also delete all tutorials in this category!</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<a href="{% url 'categories:detail' category.pk %}">Cancel</a>
{% endblock %}
