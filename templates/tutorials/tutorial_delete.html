{% extends "base.html" %}

{% block content %}
<h1>Delete Tutorial</h1>

<p>Are you sure you want to delete "{{ tutorial.title }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<a href="{% url 'tutorials:details' tutorial.pk %}">Cancel</a>
{% endblock %}
